name: Build libsigrok macOS

on:
  push:
    branches: [ picomso-driver ]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ macos-14, macos-15 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: picomso-driver

      - name: Install dependencies
        run: |
          brew update
          brew install \
            autoconf \
            automake \
            libtool \
            pkg-config \
            glib \
            libusb \
            libzip \
            libserialport \
            libftdi

      - name: Bootstrap
        run: ./autogen.sh

      - name: Configure
        run: |
          ./configure \
            --prefix=/usr/local \
            --disable-static

      - name: Build
        run: make -j"$(sysctl -n hw.ncpu)"

      - name: Install into staging dir
        run: make DESTDIR="$PWD/stage" install

      - name: Verify package contents
        run: |
          find stage/usr/local -maxdepth 3 | sort
          ls -l stage/usr/local/lib/libsigrok*.dylib || true

      - name: Package
        run: |
          PKGDIR="libsigrok-${{ matrix.runner }}"
          mkdir -p "$PKGDIR"
          cp -a stage/usr/local "$PKGDIR"/
          [ -f COPYING ] && cp COPYING "$PKGDIR"/
          [ -f README ] && cp README "$PKGDIR"/
          tar -czf "${PKGDIR}.tar.gz" "$PKGDIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsigrok-${{ matrix.runner }}
          path: libsigrok-${{ matrix.runner }}.tar.gz