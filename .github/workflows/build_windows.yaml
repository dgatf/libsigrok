name: Build libsigrok Windows

on:
  push:
    branches: [ picomso-driver ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows (MSYS2 UCRT64)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: picomso-driver

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            autoconf
            automake
            libtool
            pkgconf
            zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-libzip
            mingw-w64-ucrt-x86_64-libserialport
            mingw-w64-ucrt-x86_64-libftdi

      - name: Bootstrap
        run: ./autogen.sh

      - name: Configure
        run: |
          ./configure \
            --prefix=/ucrt64 \
            --disable-static

      - name: Build
        run: make -j"$(nproc)"

      - name: Install into staging dir
        run: make DESTDIR="$PWD/stage" install

      - name: Verify package contents
        run: |
          find stage/ucrt64 -maxdepth 3 | sort
          ls -l stage/ucrt64/bin/*sigrok* || true
          ls -l stage/ucrt64/lib/*sigrok* || true

      - name: Package
        run: |
          PKGDIR="libsigrok-windows-ucrt64"
          mkdir -p "$PKGDIR"
          cp -a stage/ucrt64 "$PKGDIR"/
          [ -f COPYING ] && cp COPYING "$PKGDIR"/
          [ -f README ] && cp README "$PKGDIR"/
          zip -r "${PKGDIR}.zip" "$PKGDIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsigrok-windows-ucrt64
          path: libsigrok-windows-ucrt64.zip