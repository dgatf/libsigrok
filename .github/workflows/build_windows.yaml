name: Build libsigrok Windows binaries

on:
  push:
    branches: [ picomso-driver ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows (MSYS2 UCRT64)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            autoconf
            automake
            libtool
            pkgconf
            zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-libusb-compat
            mingw-w64-ucrt-x86_64-libzip
            mingw-w64-ucrt-x86_64-libserialport
            mingw-w64-ucrt-x86_64-libusb-win32
            mingw-w64-ucrt-x86_64-libftdi

      - name: Bootstrap
        run: |
          ./autogen.sh

      - name: Configure
        run: |
          ./configure \
            --prefix=/ucrt64 \
            --disable-static

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Install to staging
        run: |
          make DESTDIR="$PWD/stage" install

      - name: Collect runtime package
        run: |
          PKGDIR="libsigrok-windows-ucrt64"
          mkdir -p "$PKGDIR"/bin
          mkdir -p "$PKGDIR"/lib
          mkdir -p "$PKGDIR"/include
          mkdir -p "$PKGDIR"/lib/pkgconfig

          cp -a stage/ucrt64/bin/*.dll "$PKGDIR"/bin/ || true
          cp -a stage/ucrt64/lib/libsigrok.dll.a "$PKGDIR"/lib/ || true
          cp -a stage/ucrt64/include/* "$PKGDIR"/include/
          cp -a stage/ucrt64/lib/pkgconfig/sigrok.pc "$PKGDIR"/lib/pkgconfig/ || true

          # Optional: copy license/readme if present
          [ -f COPYING ] && cp COPYING "$PKGDIR"/
          [ -f README ] && cp README "$PKGDIR"/

          zip -r "${PKGDIR}.zip" "$PKGDIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsigrok-windows-ucrt64
          path: libsigrok-windows-ucrt64.zip